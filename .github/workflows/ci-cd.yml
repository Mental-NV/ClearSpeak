name: CI/CD

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_test_publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/clientspa/package-lock.json

      - name: Restore .NET dependencies
        run: dotnet restore ClearSpeak.sln

      - name: Install frontend dependencies
        run: npm --prefix src/clientspa ci

      - name: Build solution
        run: dotnet build ClearSpeak.sln -c Release --no-restore

      - name: Run backend tests
        run: dotnet test tests/ClearSpeak.WebApp.Tests/ClearSpeak.WebApp.Tests.csproj -c Release --no-build

      - name: Run frontend tests
        run: npm --prefix src/clientspa run test

      - name: Build frontend
        run: npm --prefix src/clientspa run build

      - name: Publish web app
        run: dotnet publish src/webapp/ClearSpeak.WebApp.csproj -c Release --no-build -o ${{ github.workspace }}/artifacts/webapp

      - name: Upload published artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-publish
          path: ${{ github.workspace }}/artifacts/webapp
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build_test_publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Download published artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-publish
          path: ${{ github.workspace }}/artifacts/webapp

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: clearspeak
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}/artifacts/webapp
